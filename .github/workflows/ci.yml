name: CI/CD

on:
  push:
    branches:
      - master
    tags:
      - v*.*.*
  pull_request:
    branches:
      - master
  # Run daily at 0:01 UTC
  schedule:
    - cron:  '1 0 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.14"
    - uses: pre-commit/action@v3.0.1
      with:
        extra_args: --hook-stage manual --all-files

  test:
    runs-on: ${{ matrix.os }}
    needs: pre-commit
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macOS-latest, windows-latest]
        python-version: ["3.10", "3.14", "3.14t"]
        dask-client: ["with", "without"]
        include:
          - python-version: "3.10"
            python-conda-pkg: "python=3.10"
          - python-version: "3.14"
            python-conda-pkg: "python=3.14"
          - python-version: "3.14t"
            python-conda-pkg: "python-freethreading=3.14"

    name: Test (${{ matrix.os }}) - py ${{ matrix.python-version }}, ${{ matrix.dask-client }} dask

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up micromamba
      uses: mamba-org/setup-micromamba@v3
      with:
        environment-name: coffea-test
        init-shell: bash
        create-args: >-
          -c conda-forge
          ${{ matrix.python-conda-pkg }}
          pip
          uv
          pytest-xdist
          py-xgboost
        cache-environment: true

    - name: Install coffea and dependencies (Linux)
      if: startsWith( matrix.os, 'ubuntu' )
      run: |
        uv pip install torch --extra-index-url https://download.pytorch.org/whl/cpu
        uv pip install '.[dev,caches,parsl,dask,triton]'

    - name: Install coffea and dependencies (macOS)
      if: matrix.os == 'macOS-latest'
      run: |
        uv pip install torch
        uv pip install '.[dev,caches,dask]'

    - name: Install coffea and dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        uv pip install torch
        uv pip install '.[dev,caches,dask]'

    - name: Start triton server with example model
      if: startsWith( matrix.os, 'ubuntu' )
      run: |
        docker run -d --rm -p 8000:8000 -p 8001:8001 -p 8002:8002 -v ${{ github.workspace }}/tests/samples/triton_models_test:/models nvcr.io/nvidia/tritonserver:25.11-pyt-python-py3 tritonserver --model-repository=/models

    - name: Test with pytest (${{ matrix.dask-client }} dask Client - run in parallel)
      if: matrix.dask-client == 'without'
      run: |
        python -m pytest --cov-report=xml --cov=coffea --deselect=test_taskvine -m "not dask_client" -n 4
    - name: Test with pytest (${{ matrix.dask-client }} dask Client)
      if: matrix.dask-client == 'with'
      run: |
        python -m pytest --cov-report=xml --cov=coffea --deselect=test_taskvine -m "dask_client"
    - name: Upload codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == 3.14
      uses: codecov/codecov-action@v6
    - name: Install graphviz
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == 3.14
      uses: ts-graphviz/setup-graphviz@v2
    - name: Install pandoc
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == 3.14
      uses: r-lib/actions/setup-pandoc@v2
    - name: Build documentation
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == 3.14
      run: |
        cd docs && make html
        touch build/html/.nojekyll
    # - name: Deploy documentation
    #   if: github.event_name == 'push' && matrix.os == 'ubuntu-latest' && matrix.python-version == 3.14
    #   uses: crazy-max/ghaction-github-pages@v4
    #   with:
    #     target_branch: gh-pages
    #     build_dir: docs/build/html
    #   env:
    #     GH_PAT: ${{ secrets.GITHUB_OAUTH }}

  test-vine:
    runs-on: ubuntu-latest
    needs: pre-commit
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        python-version: ["3.14"]
    name: test coffea-taskvine
    steps:
    - uses: actions/checkout@v6
    - name: Set up micromamba
      uses: mamba-org/setup-micromamba@v3
      with:
        environment-name: coffea-vine
        init-shell: bash
        create-args: >-
          -c conda-forge
          python=${{ matrix.python-version }}
          ndcctools
          pip
          uv
          pytest
        cache-environment: true
    - name: Install coffea
      run: |
        uv pip install . 'dask<2025.1.0'
    - name: Test with pytest coffea with dask + taskvine
      timeout-minutes: 5
      run: |
        python -m pytest tests/test_taskvine_dask.py
    - name: Test with pytest coffea with virtual arrays + taskvine
      timeout-minutes: 5
      run: |
        python -m pytest tests/test_taskvine_virtual.py

